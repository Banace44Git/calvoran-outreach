# Crawler-Konfiguration (Phase 2). Navigations-Heuristik + technische Leitplanken.

limits:
  pages_per_domain: 10           # 6-10 Zielseiten, keine Vollcrawls
  request_spacing_s: 1.0         # 1 Request/Sekunde/Domain
  domain_concurrency: 15         # 10-20 Domains parallel
  timeout_s: 15
  max_bytes_per_page: 3_000_000  # Schutz gegen riesige Seiten
  user_agent: "CalvoranResearchBot/1.0 (+https://calvoran.com; Marktrecherche; Kontakt: kontakt@calvoran.com)"
  respect_robots: true

# Seitentyp -> Keywords in Navigationslinks (Linktext ODER URL-Pfad), case-insensitive.
# Reihenfolge = Priorität bei der Auswahl, wenn pages_per_domain knapp wird.
page_types:
  home:       []                 # immer die Startseite
  # historie VOR about: Substring-Match ("unternehmen" steckt in "unternehmensgeschichte"),
  # sonst finge about die Chronik-Seite ab. Eigener Typ = eigener Crawl-Slot (1 Link je Typ).
  historie:   ["unternehmensgeschichte", "firmengeschichte", "unternehmenshistorie", "geschichte", "historie", "familientradition", "tradition", "chronik", "werdegang", "meilensteine", "generationen", "jubiläum", "jubilaeum", "unsere-geschichte", "our-history", "history", "heritage", "our-story"]
  about:      ["über uns", "ueber-uns", "ueberuns", "über-uns", "wir-über-uns", "wir-ueber-uns", "unternehmen", "das-unternehmen", "unser-unternehmen", "wer wir sind", "wer-wir-sind", "über mich", "ueber-mich", "philosophie", "leitbild", "werte", "profil", "firmenprofil", "unternehmensprofil", "familienunternehmen", "familienbetrieb", "about", "about-us", "who-we-are"]
  team:       ["team", "geschäftsführung", "geschaeftsfuehrung", "geschäftsleitung", "geschaeftsleitung", "management", "vorstand", "inhaber", "gesellschafter", "ansprechpartner", "mitarbeiter", "unser-team", "das-team"]
  karriere:   ["karriere", "jobs", "stellen", "stellenangebote", "career", "offene-stellen"]
  produkte:   ["produkte", "leistungen", "leistung", "services", "portfolio", "angebot", "lösungen", "loesungen"]
  referenzen: ["referenzen", "kunden", "projekte", "case", "erfolge"]
  news:       ["news", "aktuelles", "presse", "blog", "neuigkeiten"]
  impressum:  ["impressum", "imprint", "kontakt"]

# Extraktions-Priorität fürs Token-Budget (Konzept §3.2): Über uns/Team/Karriere vor News.
extract_priority: ["about", "historie", "team", "karriere", "produkte", "home", "referenzen", "impressum", "news"]
max_extract_tokens: 10000        # Input je Firma kappen
